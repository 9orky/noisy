<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#101213">
    <meta name="description" content="Installable browser kick drum and sub generator.">
    <title>Concrete Kick</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="surface" aria-label="Concrete Kick">
        <header class="topbar">
          <h1>Concrete Kick</h1>
        </header>

        <canvas id="scope" width="860" height="220" aria-label="Scope"></canvas>

        <div class="sample-row">
          <label>
            <span>Sample</span>
            <select id="sampleSelect">
              <option value="clicky">Clicky</option>
              <option value="fis">Fis</option>
              <option value="dirty-tony">Dirty Tony</option>
            </select>
          </label>
        </div>

        <div class="knobs">
          <label class="knob" data-control="volume">
            <span>Volume</span>
            <div id="volumeDial" class="dial"></div>
            <span class="sweet-spot" aria-hidden="true"></span>
            <input id="volume" type="range" min="0" max="1.15" value="0.38" step="0.01">
            <output id="volumeValue">38%</output>
          </label>

          <label class="knob" data-control="frequency">
            <span>Hz</span>
            <div id="frequencyDial" class="dial"></div>
            <span class="sweet-spot" aria-hidden="true"></span>
            <input id="frequency" type="range" min="0" max="1" value="0.093" step="0.001">
            <output id="frequencyValue">38</output>
          </label>

          <label class="knob" data-control="body">
            <span>Body</span>
            <div id="bodyDial" class="dial"></div>
            <span class="sweet-spot" aria-hidden="true"></span>
            <input id="body" type="range" min="0" max="1" value="0.88" step="0.01">
            <output id="bodyValue">88%</output>
          </label>

          <label class="knob" data-control="edge">
            <span>Edge</span>
            <div id="edgeDial" class="dial"></div>
            <span class="sweet-spot" aria-hidden="true"></span>
            <input id="edge" type="range" min="0" max="1" value="0.09" step="0.01">
            <output id="edgeValue">9%</output>
          </label>

          <label class="knob" data-control="attack">
            <span>Attack</span>
            <div id="attackDial" class="dial"></div>
            <span class="sweet-spot" aria-hidden="true"></span>
            <input id="attack" type="range" min="0" max="1" value="0.64" step="0.01">
            <output id="attackValue">64%</output>
          </label>

          <label class="knob" data-control="tail">
            <span>Tail</span>
            <div id="tailDial" class="dial"></div>
            <span class="sweet-spot" aria-hidden="true"></span>
            <input id="tail" type="range" min="0" max="1" value="0.82" step="0.01">
            <output id="tailValue">82%</output>
          </label>

          <label class="knob" data-control="room">
            <span>Room</span>
            <div id="roomDial" class="dial"></div>
            <span class="sweet-spot" aria-hidden="true"></span>
            <input id="room" type="range" min="0" max="1" value="0.24" step="0.01">
            <output id="roomValue">24%</output>
          </label>

          <label class="knob" data-control="sample">
            <span>Sample</span>
            <div id="sampleDial" class="dial"></div>
            <span class="sweet-spot" aria-hidden="true"></span>
            <input id="sample" type="range" min="0" max="1" value="0.78" step="0.01">
            <output id="sampleValue">78%</output>
          </label>
        </div>

        <div class="transport">
          <button id="hitButton" class="hit" type="button">Hit <kbd>X</kbd></button>

          <div class="loop" role="radiogroup" aria-label="Loop">
            <span class="loop-title">Loop</span>
            <label><input type="radio" name="loop" value="0" checked><span>Off</span></label>
            <label><input type="radio" name="loop" value="1.0"><span>1s</span></label>
            <label><input type="radio" name="loop" value="0.5"><span>0.5s</span></label>
            <label><input type="radio" name="loop" value="0.25"><span>0.25s</span></label>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nexusui@2.1.6/dist/NexusUI.js"></script>
    <script src="app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js");
        });
      }
    </script>
  </body>
</html>
